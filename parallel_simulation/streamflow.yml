#!/usr/bin/env streamflow
version: v1.0
workflows:
  workflow:
    type: cwl
    config:
      file: workflow.cwl
      settings: config.yml
      docker:
        - step: /
          deployment:
            type: none
            config: {}
    bindings:
      - step: /
        target:
          deployment: c3sfr1-slurm
          service: simulation
        
database:
  type: sqlite
  config:
    connection: ./database/test3

deployments:
  c3sfr1-ssh:
    type: ssh
    config:
      nodes:
        - c3sfr1.di.unito.it
      username: scontald
      sshKey: ~/.ssh/id_rsa
    workdir: /beegfs/home/scontald/sf_tmp_simulator/
  c3sfr1-slurm:
    type: slurm
    config:
      maxConcurrentJobs: 500
      services:
        simulation:
          file: sbatch/simulation.sh
    wraps: c3sfr1-ssh